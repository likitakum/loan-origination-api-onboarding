type: http
name: Trigger underwriting evaluation
url: '{{baseUrl}}/applications/:applicationId/underwriting'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: applicationId
    value: string
body:
  type: json
  content: |-
    {
      "reevaluationReason": "string",
      "includeManualReview": false
    }
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "applicationId": "string",
            "status": "pending",
            "decision": "approved",
            "riskScore": 42,
            "evaluatedAt": "2025-03-08T07:11:46.909Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Underwriting evaluation queued
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Application not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: text
        content: ''
    name: Underwriting already in progress
